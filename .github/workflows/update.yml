name: Update README daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update README
        run: |
          DATE=$(date +'%Y-%m-%d')
          sed -i "s/<!--DATE-->.*<!--\/DATE-->/<!--DATE-->$DATE<!--\/DATE-->/" README.md

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "auto: update date" || exit 0
          git push